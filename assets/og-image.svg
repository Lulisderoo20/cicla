  </text>

  <g transform="translate(72 474)">
    <rect width="192" height="52" rx="26" fill="#fff3ea" />
    <text
      x="96"
      y="34"
      text-anchor="middle"
      fill="#9d3434"
      font-family="Aptos, Segoe UI, Candara, sans-serif"
      font-size="22"
      font-weight="700"
    >
      Instalable
    </text>
  </g>

  <g transform="translate(282 474)">
    <rect width="212" height="52" rx="26" fill="#edf8f7" />
    <text
      x="106"
      y="34"
      text-anchor="middle"
      fill="#2e8b84"
      font-family="Aptos, Segoe UI, Candara, sans-serif"
      font-size="22"
      font-weight="700"
    >
      Sin servidor
    </text>
  </g>

  <g transform="translate(514 474)">
    <rect width="290" height="52" rx="26" fill="#fff3ea" />
    <text
      x="145"
      y="34"
      text-anchor="middle"
      fill="#9d3434"
      font-family="Aptos, Segoe UI, Candara, sans-serif"
      font-size="22"
      font-weight="700"
    >
      Resumen para pareja
    </text>
  </g>

  <rect x="764" y="92" width="360" height="420" rx="36" fill="#fffdfb" opacity="0.96" />
  <rect x="804" y="144" width="280" height="88" rx="24" fill="#fff2eb" />
  <rect x="804" y="250" width="280" height="88" rx="24" fill="#eef8f7" />
  <rect x="804" y="356" width="280" height="88" rx="24" fill="#fff7ef" />

  <text x="808" y="126" fill="#9d3434" font-family="Aptos, Segoe UI, Candara, sans-serif" font-size="24" font-weight="700">

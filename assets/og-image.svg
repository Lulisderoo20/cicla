<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Cicla Open Graph image</title>
  <desc id="desc">Branded social cover for the Cicla menstrual calendar app.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8f2" />
      <stop offset="58%" stop-color="#fff0ea" />
      <stop offset="100%" stop-color="#fff9f5" />
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d55b5b" />
      <stop offset="55%" stop-color="#e28369" />
      <stop offset="100%" stop-color="#ffb36a" />
    </linearGradient>
    <linearGradient id="moon" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#fffaf3" />
      <stop offset="100%" stop-color="#ffe7d0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="150" cy="110" r="180" fill="#ffd7bf" opacity="0.48" />
  <circle cx="1040" cy="84" r="132" fill="#d8f1f0" opacity="0.78" />
  <circle cx="1130" cy="500" r="160" fill="#ffe8d6" opacity="0.88" />

  <rect x="72" y="72" width="126" height="126" rx="34" fill="url(#mark)" />
  <circle cx="136" cy="134" r="34" fill="url(#moon)" />
  <circle cx="152" cy="128" r="28" fill="#cf5657" opacity="0.22" />
  <path
    d="M108 156c8 15 19 24 31 24 18 0 33-18 33-42 0-7-1-13-3-18-5 15-18 25-34 25-11 0-21-5-28-13-3 5-4 11-4 17 0 2 0 4 1 7 1 0 2 0 4 0Z"
    fill="#fff4ea"
  />
  <circle cx="102" cy="104" r="4.5" fill="#fffaf4" />
  <circle cx="170" cy="94" r="3.5" fill="#fffaf4" opacity="0.9" />
  <circle cx="178" cy="154" r="6" fill="#fffaf4" opacity="0.82" />

  <text
    x="72"
    y="300"
    fill="#3b2022"
    font-family="Aptos Display, Segoe UI, Trebuchet MS, sans-serif"
    font-size="128"
    font-weight="700"
    letter-spacing="-6"
  >
    Cicla
  </text>
  <text
    x="72"
    y="362"
    fill="#755657"
    font-family="Aptos, Segoe UI, Candara, sans-serif"
    font-size="34"
  >
    Calendario menstrual privado, simple y compartible
  </text>
  <text
    x="72"
    y="412"
    fill="#755657"
    font-family="Aptos, Segoe UI, Candara, sans-serif"
    font-size="28"

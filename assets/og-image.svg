  </text>

  <text x="834" y="182" fill="#3b2022" font-family="Aptos, Segoe UI, Candara, sans-serif" font-size="22" font-weight="700">
    Hoy
  </text>
  <text x="834" y="210" fill="#755657" font-family="Aptos, Segoe UI, Candara, sans-serif" font-size="19">
    Seguimiento del ciclo y sintomas
  </text>

  <text x="834" y="288" fill="#3b2022" font-family="Aptos, Segoe UI, Candara, sans-serif" font-size="22" font-weight="700">
    Calendario
  </text>
  <text x="834" y="316" fill="#755657" font-family="Aptos, Segoe UI, Candara, sans-serif" font-size="19">
    Vista clara para organizarte mejor
  </text>

  <text x="834" y="394" fill="#3b2022" font-family="Aptos, Segoe UI, Candara, sans-serif" font-size="22" font-weight="700">
    Compartir
  </text>
  <text x="834" y="422" fill="#755657" font-family="Aptos, Segoe UI, Candara, sans-serif" font-size="19">
    Mensaje listo para tu pareja
  </text>

  <circle cx="1018" cy="182" r="10" fill="#d55b5b" />
  <circle cx="1018" cy="288" r="10" fill="#2e8b84" />
  <circle cx="1018" cy="394" r="10" fill="#ffb36a" />
</svg>
